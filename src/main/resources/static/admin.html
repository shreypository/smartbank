<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BugBank Admin Console</title>
    <meta name="description" content="BugBank Admin Console — manage users, accounts, and perform balance adjustments.">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="admin-wrap">

    <!-- ══════════════ ADMIN HEADER ══════════════ -->
    <header class="admin-header">
        <div class="admin-brand">
            <div class="logo-box">🏦</div>
            <div>
                <div style="font-size:1.1rem;font-weight:800;background:var(--grad-primary);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">
                    BugBank
                </div>
                <div style="font-size:0.7rem;color:var(--text-muted);">Admin Console</div>
            </div>
            <span class="admin-badge">ADMIN</span>
        </div>
        <button class="btn-logout" onclick="logout()">⏻ Logout</button>
    </header>

    <!-- ══════════════ CONTENT ══════════════ -->
    <div class="admin-content">

        <div class="section-header" style="margin-top:1rem;">
            <h2>🛡️ Admin Dashboard</h2>
            <p>Manage users, accounts and fixed deposits</p>
        </div>

        <!-- ══════════════ ACTION BUTTONS ══════════════ -->
        <div class="admin-actions">
            <button class="btn btn-primary" onclick="loadUsers()">👥 View Users</button>
            <button class="btn btn-ghost" onclick="loadAllAccountsAdmin()">🏛️ View Accounts</button>
            <button class="btn btn-ghost" onclick="loadAllFDs()">🏦 View All FDs</button>
        </div>

        <!-- ══════════════ UPDATE BALANCE ══════════════ -->
        <div class="admin-panel">
            <div class="sub-h3">💰 Update Account Balance</div>

            <div class="form-grid">
                <div class="form-field">
                    <label>Account ID</label>
                    <input type="number" id="adminAccountId" placeholder="e.g. 1001">
                </div>

                <div class="form-field">
                    <label>Amount (+/-)</label>
                    <input type="number" id="adminAmount" placeholder="e.g. +5000 or -3000">
                </div>

                <div style="display:flex;align-items:flex-end;">
                    <button class="btn btn-primary" onclick="updateBalance()">Update</button>
                </div>
            </div>
        </div>

        <!-- ══════════════ FORCE MATURE FD ══════════════ -->
        <div class="admin-panel">
            <div class="sub-h3">🏦 Force Mature Fixed Deposit</div>

            <div class="form-grid">
                <div class="form-field">
                    <label>FD ID</label>
                    <input type="number" id="adminFdId" placeholder="Enter FD ID">
                </div>

                <div style="display:flex;align-items:flex-end;">
                    <button class="btn btn-primary" onclick="forceMatureFD()">Force Mature</button>
                </div>
            </div>
        </div>

        <!-- ══════════════ RESULTS ══════════════ -->
        <div id="adminResult"></div>

    </div>
</div>

<!-- Toast Container -->
<div id="toast-container"></div>

<script src="script.js"></script>

</body>
</html>
