<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard">

    <!-- 🔝 NAVBAR -->
    <div class="navbar">
        <h2>MPHT BANK</h2>
        <div>
            <span id="userCodeDisplay"></span>
            <button onclick="logout()">Logout</button>
        </div>
    </div>

    <!-- 📚 SIDEBAR -->
    <div class="sidebar">
        <button onclick="showSection('accounts')">Accounts</button>
        <button onclick="showSection('transfer')">Transfer</button>
        <button onclick="showSection('transactions')">Transactions</button>
        <button onclick="showSection('loans')">Loans</button>
        <button onclick="showSection('cards')">Cards</button>
        <button onclick="showSection('investments')">Investments</button>
    </div>

    <!-- 📦 MAIN CONTENT -->
    <div class="main">

        <div id="accounts" class="section">

            <h2>Account Overview</h2>

            <!-- CREATE ACCOUNT -->
            <div>
                <button onclick="createAccountUI('SAVINGS')">Create Savings</button>
                <button onclick="createAccountUI('CURRENT')">Create Current</button>
                <button onclick="createAccountUI('BUSINESS')">Create Business</button>
            </div>

            <hr>

            <!-- ACCOUNT LIST -->
            <div id="accountList"></div>

            <div id="txnContainer"></div>

            <hr>

            <h3>ATM Operations</h3>

            <select id="atmAccountSelect"></select>
            <input type="number" id="atmAmount" placeholder="Enter Amount">

            <br><br>

            <button style="background:green; color:white;" onclick="atmDeposit()">Deposit</button>
            <button style="background:red; color:white;" onclick="atmWithdraw()">Withdraw</button>

            <p id="atmResult"></p>

        </div>

        <div id="transfer" class="section hidden">

            <h2>Transfer Funds</h2>

            <select id="fromAccountSelect"></select>
            <input type="number" id="toAccountId" placeholder="Receiver Account ID">
            <input type="number" id="transferAmount" placeholder="Amount">

            <select id="category">
                <option value="friend">Friend/Family</option>
                <option value="loan">Loan</option>
                <option value="investment">Investment</option>
                <option value="grocery">Grocery</option>
                <option value="travel">Travel</option>
                <option value="PERSONAL">Personal</option>
            </select>

            <button onclick="transferUI()">Transfer</button>

            <p id="transferResult"></p>

        </div>

        <div id="transactions" class="section hidden">

            <h2>Find Transactions</h2>

            <select id="txnAccountSelect"></select>
            <button onclick="loadLast15Transactions()">View Last 15</button>

            <hr>

            <input type="text" id="searchTxnId" placeholder="Transaction ID">
            <button onclick="searchById()">Search</button>

            <br><br>

            <input type="number" id="searchAmount" placeholder="Amount">
            <button onclick="searchByAmount()">Search</button>

            <br><br>

            <input type="date" id="startDate">
            <input type="date" id="endDate">
            <button onclick="searchByDateRange()">Search by Date Range</button>

            <div id="txnResult"></div>

        </div>

        <div id="loans" class="section hidden">

            <h2>Loans</h2>

            <!-- APPLY LOAN -->
            <input type="number" id="loanAmount" placeholder="Loan Amount">
            <input type="number" id="downPayment" placeholder="Down Payment">
            <input type="number" id="loanMonths" placeholder="Duration (months)">

            <select id="loanApplyAccountSelect"></select>

            <button onclick="applyLoan()">Apply Loan</button>

            <hr>

            <button onclick="loadLoans()">View Loans</button>

            <div id="loanResult"></div>

            <br><br>

            <!-- PAY LOAN DROPDOWN -->
            <select id="loanPayAccountSelect"></select>

        </div>

        <div id="cards" class="section hidden">

            <h2>Cards</h2>

            <button onclick="applyCard('DEBIT')">Apply Debit Card</button>
            <button onclick="applyCard('CREDIT')">Apply Credit Card</button>

            <hr>

            <button onclick="loadCards()">View Cards</button>

            <div id="cardResult"></div>

        </div>

        <div id="investments" class="section hidden">

            <h2>Investments</h2>

            <div style="display:flex; justify-content:space-between; margin-bottom:15px; font-size:18px;">

                <div>
                    <strong>Total Invested:</strong>
                    <span id="totalInvested">₹0</span>
                </div>

                <div>
                    <strong>Profit:</strong>
                    <span id="totalProfit" style="color:green; font-weight:bold;">+₹0 ↑</span>
                </div>

            </div>



            <div id="investmentCards" style="display:grid; grid-template-columns:repeat(3,1fr); gap:15px;"></div>

            <hr>

            <h3>Your Investments</h3>
            <div id="invResult"></div>

        </div>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
