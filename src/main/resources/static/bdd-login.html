<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BugBank - Cucumber Login Testing</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="landing-bg"></div>
    <div class="landing-container" style="max-width: 400px; margin: 100px auto;">
        <div class="form-card">
            <h2>Secure Login v2</h2>
            <p class="form-sub">Test Bed for Cucumber Scenario Outlines</p>
            <div class="input-group">
                <span class="input-icon">👤</span>
                <input type="text" id="username" placeholder="Enter username">
            </div>
            <div class="input-group">
                <span class="input-icon">🔒</span>
                <input type="password" id="password" placeholder="Enter password">
            </div>
            <button id="btn-login" class="btn btn-primary" onclick="attemptLogin()" style="width: 100%;">Login</button>
            <div id="login-message" style="margin-top: 1rem; font-weight: bold; text-align: center;"></div>
        </div>
    </div>
    
    <script>
        function attemptLogin() {
            const user = document.getElementById("username").value.trim();
            const pass = document.getElementById("password").value.trim();
            const msgBox = document.getElementById("login-message");
            
            if(!user || !pass) {
                msgBox.innerText = "Username/Password required";
                msgBox.style.color = "var(--danger)";
                return;
            }
            if(user === "lockedUser") {
                msgBox.innerText = "Account Locked";
                msgBox.style.color = "var(--warning)";
                return;
            }
            if(user === "validUser" && pass === "validPass123$") {
                msgBox.innerText = "Success";
                msgBox.style.color = "var(--success)";
                setTimeout(() => {
                    window.location.href = "dashboard.html";
                }, 1000);
            } else {
                msgBox.innerText = "Invalid credentials";
                msgBox.style.color = "var(--danger)";
            }
        }
    </script>
</body>
</html>
